<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mallorca · Itinerario interactivo</title>
  <meta name="theme-color" content="#0ea5e9" />
  <style>
    :root{
      --bg:#f4f7fb;
      --bg2:#eaf4ff;
      --card:#ffffff;
      --text:#132033;
      --muted:#607089;
      --line:#d9e4f0;
      --primary:#0ea5e9;
      --primary2:#0284c7;
      --accent:#22c55e;
      --warning:#f59e0b;
      --danger:#ef4444;
      --chip:#eef6ff;
      --shadow:0 12px 30px rgba(16,24,40,.10);
      --radius:20px;
      --radius-sm:14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} button,a,select,input,textarea{touch-action:manipulation;pointer-events:auto}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--text);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif}
    body{padding-bottom:calc(88px + var(--safe-bottom))}
    a{color:inherit}
    .app{max-width:1100px;margin:0 auto;padding:14px 14px 0}
    .topbar{position:relative;top:auto;z-index:10;background:transparent;border-bottom:none}
    .topbar-inner{max-width:1100px;margin:0 auto;padding:10px 14px 6px}
    .hero{background:linear-gradient(135deg,rgba(14,165,233,.14),rgba(34,197,94,.08));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .hero-image{position:relative;height:110px;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.18)),url('https://pplx-res.cloudinary.com/image/upload/pplx_search_images/065216d1b691ca454f9c63c4d98881504d15db0b.jpg') center/cover no-repeat}
    .hero-content{padding:14px}
    .title{margin:0;font-size:clamp(1.5rem,4.6vw,2.4rem);line-height:1.1}
    .subtitle{margin:8px 0 0;color:var(--muted);line-height:1.45;font-size:.98rem}
    .chips{display:none}
    .chip{background:var(--chip);color:#0b5f84;border:1px solid #cce8ff;padding:8px 11px;border-radius:999px;font-size:.85rem;font-weight:700}
    .quick-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;min-height:46px;padding:12px 14px;border-radius:14px;border:1px solid transparent;font-weight:800;cursor:pointer;font-size:.95rem}
    
    .btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:#fff;border-color:var(--line);color:var(--text)}.btn-success{background:#eafaf0;border-color:#c8f0d4;color:#166534}.btn-warning{background:#fff7e8;border-color:#ffe0a8;color:#92400e}.btn-danger{background:#fff0f0;border-color:#ffd4d4;color:#991b1b}.btn.small{min-height:38px;padding:10px 12px;font-size:.88rem;border-radius:12px}
    .section{margin-top:12px}.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}.panel h2,.panel h3{margin:0 0 8px;line-height:1.15}.muted{color:var(--muted)}
    .toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-top:16px}
    .search-box,.select-box{width:100%;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;min-height:48px;padding:12px 14px;font-size:1rem;outline:none}
    .tab-strip{display:flex;gap:10px;overflow:auto;padding:4px 1px 2px;scroll-snap-type:x proximity}.tab-strip::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;scroll-snap-align:start;border:none;background:#fff;border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:999px;font-weight:800;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);white-space:nowrap}
    .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .tab-view{display:none}.tab-view.active{display:block}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
    .day-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .day-badge{background:#f0f9ff;color:#075985;border:1px solid #cfefff;padding:8px 10px;border-radius:999px;font-size:.84rem;font-weight:800}
    .timeline{display:grid;gap:8px;margin-top:10px}
    .timeline-item{display:grid;grid-template-columns:68px 1fr;gap:10px;align-items:start}
    .time{font-weight:800;color:#0b5f84;background:#edf8ff;border:1px solid #caeaff;padding:8px 10px;border-radius:12px;text-align:center;font-size:.88rem}
    .event{background:#fbfdff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;line-height:1.45}
    .place-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .place-cover{position:relative;height:190px;background:#dceaf7 center/cover no-repeat}
    .place-badges{position:absolute;left:10px;right:10px;bottom:10px;display:flex;gap:8px;flex-wrap:wrap}
    .badge{background:rgba(255,255,255,.94);color:#0f172a;border:1px solid rgba(255,255,255,.8);backdrop-filter:blur(8px);padding:7px 10px;border-radius:999px;font-size:.78rem;font-weight:800}
    .place-body{padding:13px}.place-title{margin:0 0 7px;font-size:1.05rem}.place-desc{margin:0;color:var(--muted);line-height:1.45;font-size:.94rem}
    .place-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.place-tags span{background:#f8fbff;border:1px solid var(--line);color:#35506f;padding:7px 9px;border-radius:999px;font-size:.8rem;font-weight:700}
    .place-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.place-actions .full{grid-column:1/-1}
    .notes-box{margin-top:12px;display:none}.notes-box.open{display:block}
    textarea.notes{width:100%;min-height:90px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;color:var(--text);background:#fff}
    .list{margin:0;padding-left:20px;line-height:1.6}
    .check-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .check-btn{width:100%;justify-content:flex-start;text-align:left;background:#fff;border:1px solid var(--line);color:var(--text)}
    .check-btn.done{background:#eafaf0;border-color:#bde7ca;color:#166534}
    .check-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px calc(10px + var(--safe-bottom));background:linear-gradient(180deg,rgba(244,247,251,.2),rgba(244,247,251,.98) 25%);backdrop-filter:blur(12px)}
    .bottom-nav-inner{max-width:780px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:8px}
    .nav-btn{border:none;background:transparent;min-height:52px;border-radius:16px;color:var(--muted);font-weight:800;cursor:pointer;font-size:.74rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
    .nav-btn.active{background:#eff8ff;color:var(--primary2)}.icon{font-size:1.15rem;line-height:1}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .stat{background:#fbfdff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.stat strong{display:block;font-size:1.2rem;margin-bottom:4px}
    .hidden{display:none!important}
    @media (min-width:720px){.hero-image{height:150px}.quick-actions{grid-template-columns:1fr}.toolbar{grid-template-columns:1.1fr .7fr}.grid{grid-template-columns:repeat(2,1fr)}.check-grid{grid-template-columns:repeat(2,1fr)}}
    @media (min-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}.hero-image{height:190px}}
  </style>
</head>

{id:"dia1",title:"Día 1",icon:"1",render:()=>`<div class="tab-view" id="view-dia1"><div class="panel"><div class="day-header"><h2>Día 1 · Llegada / hotel</h2><span class="day-badge">Sa Coma</span></div><div class="timeline"><div class="timeline-item"><div class="time">Tarde</div><div class="event">Check-in, hotel, compra de agua y paseo suave por Sa Coma.</div></div><div class="timeline-item"><div class="time">Noche</div><div class="event">Cena tranquila y preparar mochila para el domingo.</div></div></div>${renderPlaces(["hotel","saComaBeach"])}</div></div>`},
{id:"dia2",title:"Domingo",icon:"2",render:()=>`<div class="tab-view" id="view-dia2"><div class="panel"><div class="day-header"><h2>Domingo · Alcúdia + mirador + Playa de Muro</h2><span class="day-badge">Día 2</span></div><div class="timeline"><div class="timeline-item"><div class="time">Temprano</div><div class="event">Parking junto a Alcúdia y paseo por murallas/casco antiguo.</div></div><div class="timeline-item"><div class="time">Mediodía</div><div class="event">Subida al Mirador Es Colomer; parking propio y paseo corto.</div></div><div class="timeline-item"><div class="time">Tarde</div><div class="event">Playa de Muro para baño y vuelta al hotel.</div></div></div>${renderPlaces(["alcudia","muro"])}</div></div>`},
{id:"dia3",title:"Lunes",icon:"3",render:()=>`<div class="tab-view" id="view-dia3"><div class="panel"><div class="day-header"><h2>Lunes · Caló des Moro + Cala Varques</h2><span class="day-badge">Día 3 · calas</span></div><div class="timeline"><div class="timeline-item"><div class="time">Muy temprano</div><div class="event">Caló des Moro: llega pronto; desde el parking hay sendero con escalones y terreno irregular.</div></div><div class="timeline-item"><div class="time">Tarde</div><div class="event">Cala Varques: cala natural con tramo largo a pie. Es habitual encontrar ambiente nudista; llevad calzado cerrado, agua y no dejéis objetos a la vista.</div></div></div><p class="muted">Plan exigente: ambas calas requieren caminata. Con niño pequeño, valorad hacer solo una y disfrutarla sin prisas.</p></div></div>`},
{id:"dia4",title:"Martes",icon:"4",render:()=>`<div class="tab-view" id="view-dia4"><div class="panel"><div class="day-header"><h2>Martes · Hotel + Puerto Andratx + Palma</h2><span class="day-badge">Día 4 · oeste</span></div><div class="timeline"><div class="timeline-item"><div class="time">Mañana</div><div class="event">Mañana tranquila en hotel o playa.</div></div><div class="timeline-item"><div class="time">Mediodía</div><div class="event">Puerto Andratx: paseo por el puerto y comida.</div></div><div class="timeline-item"><div class="time">Tarde</div><div class="event">Palma: Parc de la Mar, Catedral y casco histórico. Mirad el parking antes de entrar al centro.</div></div></div>${renderPlaces(["hotel","palmaCathedral","parcMar"])}</div></div>`},
{id:"dia5",title:"Miércoles",icon:"5",render:()=>`<div class="tab-view" id="view-dia5"><div class="panel"><div class="day-header"><h2>Miércoles · Sa Calobra</h2><span class="day-badge">Día 5 · salida temprana</span></div><div class="timeline"><div class="timeline-item"><div class="time">07:00</div><div class="event">Salida temprana: carretera de curvas, miradores y tráfico en temporada.</div></div><div class="timeline-item"><div class="time">Llegada</div><div class="event">Parking de Sa Calobra y paseo al puerto, playa y Torrent de Pareis.</div></div><div class="timeline-item"><div class="time">Tarde</div><div class="event">Regreso con calma; evitad volver muy tarde por la carretera.</div></div></div>${renderPlaces(["saCalobraRoad","saCalobra"])}</div></div>`},
{id:"dia6",title:"Jueves",icon:"6",render:()=>`<div class="tab-view" id="view-dia6"><div class="panel"><div class="day-header"><h2>Jueves · Cala Ratjada + Cala Agulla</h2><span class="day-badge">Día 6 · este</span></div><div class="timeline"><div class="timeline-item"><div class="time">Mañana</div><div class="event">Llegada temprana a Cala Agulla para encontrar plaza.</div></div><div class="timeline-item"><div class="time">Mediodía</div><div class="event">Playa y comida en Cala Ratjada.</div></div><div class="timeline-item"><div class="time">Tarde</div><div class="event">Paseo por puerto o faro si queda energía.</div></div></div>${renderPlaces(["calaAgulla","calaRatjada"])}</div></div>`},
{id:"dia7",title:"Viernes",icon:"7",render:()=>`<div class="tab-view" id="view-dia7"><div class="panel"><div class="day-header"><h2>Viernes · Cuevas del Drach</h2><span class="day-badge">Día 7 · Porto Cristo</span></div><div class="timeline"><div class="timeline-item"><div class="time">Reserva</div><div class="event">Comprad entrada online y llegad 15 min antes de la hora elegida.</div></div><div class="timeline-item"><div class="time">Mañana</div><div class="event">Parking oficial y visita a las cuevas.</div></div><div class="timeline-item"><div class="time">Después</div><div class="event">Puerto de Porto Cristo y comida antes de volver.</div></div></div>${renderPlaces(["drach","portoCristo"])}</div></div>`},
{id:"dia8",title:"Sábado",icon:"↩",render:()=>`<div class="tab-view" id="view-dia8"><div class="panel"><div class="day-header"><h2>Sábado · Vuelta</h2><span class="day-badge">Día 8</span></div><div class="timeline"><div class="timeline-item"><div class="time">Antes de salir</div><div class="event">Check-out, revisar checklist, agua y documentación. Ajustad el último paseo al horario real de salida.</div></div></div>${renderPlaces(["hotel"])}</div></div>`},
{id:"parking",title:"Parking",icon:"🅿️",render:()=>`<div class="tab-view" id="view-parking"><div class="panel"><div class="day-header"><h2>Parking y distancia a pie</h2><span class="day-badge">Maps directo</span></div><p class="muted">Las distancias son aproximadas y se refieren al parking indicado. En calas, no aparquéis fuera de zonas permitidas.</p><div class="grid">${parkingCards()}</div></div></div>`},
{id:"gastro",title:"Comer",icon:"🍴",render:()=>`<div class="tab-view" id="view-gastro"><div class="panel"><div class="day-header"><h2>Dónde comer</h2><span class="day-badge">Usad Maps</span></div><p class="muted">Revisad horario y disponibilidad el mismo día.</p></div></div>`},
{id:"util",title:"Útil",icon:"🎒",render:()=>`<div class="tab-view" id="view-util"><div class="panel"><div class="day-header"><h2>Checklist diario</h2><span class="day-badge">Mochila</span></div><ul class="list"><li>Agua, protector SPF50, gorra y gafas.</li><li>Toalla, bañador, snacks y powerbank.</li><li>Calzado cerrado para Caló des Moro, Cala Varques y Sa Calobra.</li></ul></div></div>`}
];
function parkingCards(){const items=[
["Domingo · Alcúdia","Parking Alcúdia junto a murallas","5–8 min / aprox. 400–600 m al casco histórico","https://www.google.com/maps/search/?api=1&query=Parking+Alcudia+Old+Town+Mallorca"],
["Domingo · Mirador Es Colomer","Parking Mirador Es Colomer","3–5 min / aprox. 200–300 m al mirador","https://www.google.com/maps/search/?api=1&query=Parking+Mirador+Es+Colomer+Mallorca"],
["Domingo · Playa de Muro","Parking Playa de Muro","2–8 min / aprox. 150–600 m según el acceso","https://www.google.com/maps/search/?api=1&query=Parking+Playa+de+Muro+Mallorca"],
["Lunes · Caló des Moro","Parking Cala Llombards / Camí de Cala Llombards","20–30 min / aprox. 1,3 km hasta Caló des Moro; sendero irregular","https://www.google.com/maps/search/?api=1&query=Parking+Cala+Llombards+Mallorca"],
["Lunes · Cala Varques","Parking / acceso autorizado Cala Varques","15–40 min / aprox. 1,5–2,5 km según el punto abierto; confirmad restricciones en Maps","https://www.google.com/maps/search/?api=1&query=Parking+Cala+Varques+Mallorca"],
["Martes · Puerto Andratx","Parking Port d’Andratx","5–12 min / aprox. 400–900 m al paseo del puerto","https://www.google.com/maps/search/?api=1&query=Parking+Port+d%27Andratx+Mallorca"],
["Martes · Palma","Parking Parc de la Mar","5–10 min / aprox. 400–750 m a Catedral y casco histórico","https://www.google.com/maps/search/?api=1&query=Parking+Parc+de+la+Mar+Palma+Mallorca"],
["Miércoles · Sa Calobra","Parking Sa Calobra / Torrent de Pareis","8–15 min / aprox. 600 m–1 km a puerto, playa y entrada del Torrent","https://www.google.com/maps/search/?api=1&query=Parking+Sa+Calobra+Torrent+de+Pareis+Mallorca"],
["Jueves · Cala Agulla","Parking Cala Agulla","5–15 min / aprox. 400 m–1 km a la playa, según plaza","https://www.google.com/maps/search/?api=1&query=Parking+Cala+Agulla+Mallorca"],
["Jueves · Cala Ratjada","Parking Cala Ratjada","5–15 min / aprox. 400 m–1 km al puerto/centro","https://www.google.com/maps/search/?api=1&query=Parking+Cala+Ratjada+Mallorca"],
["Viernes · Cuevas del Drach","Parking oficial Cuevas del Drach","200 m / 3–5 min a la entrada","https://www.google.com/maps/search/?api=1&query=Parking+Cuevas+del+Drach+Porto+Cristo+Mallorca"],
["Sábado · Hotel","Parking Protur Sa Coma Playa Hotel & Spa","0–3 min / parking de hotel","https://www.google.com/maps/search/?api=1&query=Protur+Sa+Coma+Playa+Hotel+Spa+Mallorca"]];return items.map(x=>`<article class="place-card"><div class="place-body"><h3 class="place-title">${x[0]}</h3><p class="place-desc"><strong>${x[1]}</strong><br>${x[2]}</p><div class="place-actions"><a class="btn btn-primary small full" target="_blank" href="${x[3]}">Abrir parking en Maps</a></div></div></article>`).join("")}

    const state = loadState();
    function defaultState(){const notes={},done={},fav={},checklist={};Object.keys(placeData).forEach(id=>{notes[id]="";done[id]=false;fav[id]=false});checklistItems.forEach(item=>{checklist[item.id]=false});return{activeTab:"inicio",notes,done,fav,checklist,search:"",filter:"all"}}
    function loadState(){try{const raw=storageGet(appKey);if(!raw)return defaultState();const parsed=JSON.parse(raw);return{...defaultState(),...parsed,notes:{...defaultState().notes,...(parsed.notes||{})},done:{...defaultState().done,...(parsed.done||{})},fav:{...defaultState().fav,...(parsed.fav||{})},checklist:{...defaultState().checklist,...(parsed.checklist||{})}}}catch(e){return defaultState()}}
    function saveState(){storageSet(appKey, JSON.stringify(state));updateStats()}
    function renderPlaces(ids){return `<div class="grid">${ids.map(id=>renderPlaceCard(placeData[id])).join("")}</div>`}
    function renderChecklistButtons(){return `<div class="check-grid">` + checklistItems.map(function(item){ return `<button type="button" class="btn check-btn ${state.checklist[item.id]?"done":""}" onclick="toggleChecklistItem('${item.id}')">${state.checklist[item.id]?"✅":"⬜️"} ${item.label}</button>`; }).join("") + `</div>`}
    function renderPlaceCard(place){const isFav=!!state.fav[place.id];const isDone=!!state.done[place.id];const note=state.notes[place.id]||"";return `<article class="place-card searchable" data-place-id="${place.id}" data-title="${escapeAttr(place.title)}" data-desc="${escapeAttr(place.desc)}" data-tags="${escapeAttr((place.tags||[]).join(' '))}" data-type="${escapeAttr((place.type||[]).join(' '))}" data-day="${escapeAttr(place.day)}" data-fav="${isFav?'1':'0'}" data-done="${isDone?'1':'0'}"><div class="place-cover" style="background-image:url('${place.image}')"><div class="place-badges">${(place.badges||[]).map(b=>`<span class="badge">${b}</span>`).join("")}${isFav?`<span class="badge">❤️ Favorito</span>`:``}${isDone?`<span class="badge">✅ Hecho</span>`:``}</div></div><div class="place-body"><h3 class="place-title">${place.title}</h3><p class="place-desc">${place.desc}</p><div class="place-tags">${(place.tags||[]).map(t=>`<span>${t}</span>`).join("")}</div><div class="place-actions"><a class="btn btn-primary small" target="_blank" href="${place.maps}">Maps</a><a class="btn btn-secondary small" target="_blank" href="${place.photos}">Fotos</a>${place.official?`<a class="btn btn-success small full" target="_blank" href="${place.official}">Web oficial</a>`:``}<button type="button" class="btn ${isFav?'btn-danger':'btn-warning'} small" onclick="toggleFav('${place.id}')">${isFav?'Quitar fav':'Favorito'}</button><button type="button" class="btn ${isDone?'btn-secondary':'btn-success'} small" onclick="toggleDone('${place.id}')">${isDone?'Desmarcar':'Marcar hecho'}</button><button type="button" class="btn btn-secondary small full" onclick="toggleNotes('${place.id}')">Notas</button></div><div class="notes-box" id="notes-box-${place.id}"><textarea class="notes" placeholder="Anotaciones, horarios, parking, restaurante..." oninput="saveNote('${place.id}', this.value)">${escapeHtml(note)}</textarea></div></div></article>`}
    function renderApp(){renderTabs();renderViews();bindControls();updateStats();applyFilters();activateTab(state.activeTab);setBottomNav(state.activeTab)}
    function renderTabs(){document.getElementById("tabStrip").innerHTML=tabs.map(t=>`<button type="button" class="tab-btn ${state.activeTab===t.id?'active':''}" data-tab="${t.id}">${t.icon} ${t.title}</button>`).join("")}
    function renderViews(){document.getElementById("views").innerHTML=tabs.map(t=>t.render()).join("")}
    function bindControls(){document.querySelectorAll(".tab-btn").forEach(btn=>btn.onclick=()=>activateTab(btn.dataset.tab));document.querySelectorAll(".nav-btn").forEach(btn=>btn.onclick=()=>{const jump=btn.dataset.jump;activateTab(jump);setBottomNav(jump);try{window.scrollTo({top:0,behavior:"smooth"})}catch(e){window.scrollTo(0,0)}});const searchInput=document.getElementById("searchInput");const filterSelect=document.getElementById("filterSelect");if(searchInput){searchInput.value=state.search;searchInput.oninput=e=>{state.search=e.target.value;saveState();applyFilters()};} if(filterSelect){filterSelect.value=state.filter;filterSelect.onchange=e=>{state.filter=e.target.value;saveState();applyFilters()};}const favBtn=document.getElementById("showFavoritesBtn");if(favBtn){favBtn.onclick=()=>{state.filter="favorito";const fs=document.getElementById("filterSelect");if(fs)fs.value="favorito";activateTab("extras");saveState();applyFilters()};}const resetBtn=document.getElementById("resetAppBtn");if(resetBtn){resetBtn.onclick=()=>{const ok=window.confirm?confirm("¿Reiniciar favoritos, notas y lugares marcados?"):true;if(ok){storageRemove(appKey);location.reload()}}}}
    function activateTab(id){state.activeTab=id;saveState();document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));document.querySelectorAll(".tab-view").forEach(v=>v.classList.remove("active"));const view=document.getElementById(`view-${id}`);if(view)view.classList.add("active");setBottomNav(id)}
    function setBottomNav(id){let key=id;if(["dia1","dia2","dia3","dia4","dia5","dia6","dia7","dia8"].includes(id)) key="dia1";document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active", b.dataset.jump===key))}
    function applyFilters(){const q=(state.search||"").trim().toLowerCase();const filter=state.filter;document.querySelectorAll(".searchable").forEach(card=>{const text=[card.dataset.title,card.dataset.desc,card.dataset.tags,state.notes[card.dataset.placeId]||""].join(" ").toLowerCase();const types=(card.dataset.type||"").split(" ");const isFav=card.dataset.fav==="1";const isDone=card.dataset.done==="1";let okText=!q||text.includes(q);let okFilter=true;if(filter==="favorito") okFilter=isFav; else if(filter==="hecho") okFilter=isDone; else if(filter==="pendiente") okFilter=!isDone; else if(filter!=="all") okFilter=types.includes(filter);card.classList.toggle("hidden", !(okText&&okFilter))});document.querySelectorAll(".grid").forEach(grid=>{const visible=[...grid.querySelectorAll(".searchable")].filter(x=>!x.classList.contains("hidden")).length;grid.classList.toggle("hidden", visible===0 && grid.querySelectorAll(".searchable").length>0)})}
    function updateStats(){const ids=Object.keys(placeData);const done=ids.filter(id=>state.done[id]).length;const favs=ids.filter(id=>state.fav[id]).length;document.getElementById("statPlaces").textContent=ids.length;document.getElementById("statDone").textContent=done;document.getElementById("statFavs").textContent=favs;document.querySelectorAll(".searchable").forEach(card=>{const id=card.dataset.placeId;card.dataset.fav=state.fav[id]?"1":"0";card.dataset.done=state.done[id]?"1":"0"})}
    function toggleFav(id){state.fav[id]=!state.fav[id];saveState();renderApp()}
    function toggleChecklistItem(id){state.checklist[id]=!state.checklist[id];saveState();renderApp();activateTab("util")}
    function markAllChecklist(){checklistItems.forEach(item=>state.checklist[item.id]=true);saveState();renderApp();activateTab("util")}
    function resetChecklist(){checklistItems.forEach(item=>state.checklist[item.id]=false);saveState();renderApp();activateTab("util")}
    function toggleDone(id){state.done[id]=!state.done[id];saveState();renderApp()}
    function toggleNotes(id){const box=document.getElementById(`notes-box-${id}`);if(box) box.classList.toggle("open")}
    function saveNote(id, value){state.notes[id]=value;saveState();applyFilters()}
    function escapeHtml(str=""){return str.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function escapeAttr(str=""){return escapeHtml(str)}
    renderApp();window.toggleFav=toggleFav;window.toggleDone=toggleDone;window.toggleNotes=toggleNotes;window.saveNote=saveNote;window.toggleChecklistItem=toggleChecklistItem;window.markAllChecklist=markAllChecklist;window.resetChecklist=resetChecklist;document.addEventListener("touchstart", function(){}, {passive:true});
  </script>
</body>
</html>
